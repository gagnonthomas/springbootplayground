spring.application.name=springbootplayground

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:playground
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# Actuator endpoints for health checks (useful for cloud platforms)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# App info for actuator /info endpoint
info.app.name=Spring Boot Playground
info.app.description=A playground for testing CI/CD and cloud deployments
info.app.version=0.0.1-SNAPSHOT
